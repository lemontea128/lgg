<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM卡投资 - 简易同步版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 总投资卡片 */
        .total-card {
            background: linear-gradient(135deg, #0f9d58 0%, #0b7e44 100%);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            color: white;
            text-align: center;
        }

        .total-card .amount {
            font-size: 60px;
            font-weight: bold;
        }

        /* 同步状态条 */
        .sync-bar {
            background: white;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .sync-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f39c12;
        }

        .status-dot.connected {
            background: #27ae60;
        }

        .sync-btn {
            background: #0f9d58;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* 设置面板 */
        .setup-panel {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
        }

        .setup-panel.show {
            display: block;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }

        .input-group input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .input-group button {
            padding: 10px 20px;
            background: #0f9d58;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* 统计卡片 */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .stat-card .number {
            font-size: 30px;
            font-weight: bold;
            color: #333;
        }

        /* 主要内容 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
        }

        /* 表单 */
        .form-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
        }

        .type-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .type-tab {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
        }

        .type-tab.active {
            background: #0f9d58;
            color: white;
            border-color: #0f9d58;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .btn {
            background: #0f9d58;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }

        .btn-danger {
            background: #e74c3c;
        }

        /* 记录列表 */
        .records-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
        }

        .record-item {
            background: #f8f9fa;
            border-left: 4px solid;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .record-item.invest-add { border-left-color: #27ae60; }
        .record-item.invest-sub { border-left-color: #e74c3c; }
        .record-item.sim-in { border-left-color: #3498db; }
        .record-item.sim-out { border-left-color: #f39c12; }

        .record-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .record-footer {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .delete-btn {
            color: #e74c3c;
            cursor: pointer;
        }

        /* 确认对话框 */
        .confirm-dialog {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .confirm-dialog.show {
            display: flex;
        }

        .confirm-box {
            background: white;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
        }

        .confirm-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .confirm-btn {
            padding: 8px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .confirm-btn.yes { background: #e74c3c; color: white; }
        .confirm-btn.no { background: #95a5a6; color: white; }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 总投资 -->
        <div class="total-card">
            <div class="amount" id="totalAmount">0.00</div>
            <div>马来西亚林吉特 (RM)</div>
        </div>

        <!-- 同步状态条 -->
        <div class="sync-bar">
            <div class="sync-status">
                <div class="status-dot" id="statusDot"></div>
                <span id="syncStatus">未连接</span>
                <span id="lastSync"></span>
            </div>
            <div>
                <button class="sync-btn" onclick="toggleSetup()">⚙️ 设置</button>
                <button class="sync-btn" onclick="manualSync()" style="margin-left: 10px;">🔄 同步</button>
            </div>
        </div>

        <!-- 设置面板 -->
        <div class="setup-panel" id="setupPanel">
            <h3>Google Sheets 设置 (只需一次)</h3>
            
            <div style="background: #f8f9fa; padding: 15px; border-radius: 5px; margin-bottom: 15px;">
                <p><strong>步骤1:</strong> 复制下面这段代码</p>
                <div style="background: #333; color: white; padding: 10px; border-radius: 5px; margin: 10px 0; font-family: monospace; font-size: 12px; cursor: pointer;" onclick="copyScript()">
                    ⚡ 点击复制 Apps Script 代码
                </div>
                
                <p><strong>步骤2:</strong> 打开 <a href="https://sheets.new" target="_blank">Google Sheets</a> 创建新表格</p>
                
                <p><strong>步骤3:</strong> 点"扩展程序" → "Apps Script" → 粘贴代码 → 部署为网页应用</p>
                
                <p><strong>步骤4:</strong> 粘贴部署后的URL</p>
            </div>

            <div class="input-group">
                <input type="text" id="scriptUrl" placeholder="粘贴你的 Web App URL" value="">
                <button onclick="saveUrl()">保存</button>
            </div>
            
            <div class="input-group">
                <label>
                    <input type="checkbox" id="autoSync" checked> 开启自动同步 (每30秒自动同步)
                </label>
            </div>
        </div>

        <!-- 统计 -->
        <div class="stats-row">
            <div class="stat-card">
                <div>📱 库存</div>
                <div class="number" id="totalSimCards">0</div>
                <div>张</div>
            </div>
            <div class="stat-card">
                <div>📥 总进</div>
                <div class="number" id="totalSimIn">0</div>
                <div>张 (RM <span id="totalSimInAmount">0</span>)</div>
            </div>
            <div class="stat-card">
                <div>📤 总出</div>
                <div class="number" id="totalSimOut">0</div>
                <div>张 (RM <span id="totalSimOutAmount">0</span>)</div>
            </div>
        </div>

        <!-- 主要内容 -->
        <div class="main-content">
            <!-- 表单 -->
            <div class="form-container">
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                    <h3>添加记录</h3>
                    <button class="btn-danger" style="width: auto; padding: 5px 15px;" onclick="showClearConfirm()">清空</button>
                </div>
                
                <div class="type-tabs">
                    <div class="type-tab active" onclick="switchType('invest')" id="tab-invest">💰 总投资</div>
                    <div class="type-tab" onclick="switchType('sim')" id="tab-sim">📱 SIM卡</div>
                </div>
                
                <form id="investForm">
                    <div class="form-group">
                        <label>日期</label>
                        <input type="date" id="investDate" required>
                    </div>
                    <div class="form-group">
                        <label>操作</label>
                        <select id="investOperation" required>
                            <option value="add">➕ 放钱</option>
                            <option value="subtract">➖ 拿钱</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>金额 (RM)</label>
                        <input type="number" id="investAmount" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>描述</label>
                        <input type="text" id="investDesc" required>
                    </div>
                    <div class="form-group">
                        <label>记录人</label>
                        <input type="text" id="investCreator" required>
                    </div>
                    <button type="submit" class="btn">添加</button>
                </form>

                <form id="simForm" style="display: none;">
                    <div class="form-group">
                        <label>日期</label>
                        <input type="date" id="simDate" required>
                    </div>
                    <div class="form-group">
                        <label>类型</label>
                        <select id="simType" required>
                            <option value="in">📥 进卡</option>
                            <option value="out">📤 出卡</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>数量</label>
                        <input type="number" id="simQuantity" required>
                    </div>
                    <div class="form-group">
                        <label>金额 (RM)</label>
                        <input type="number" id="simAmount" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>描述</label>
                        <input type="text" id="simDesc">
                    </div>
                    <div class="form-group">
                        <label>记录人</label>
                        <input type="text" id="simCreator" required>
                    </div>
                    <button type="submit" class="btn">添加</button>
                </form>
            </div>

            <!-- 记录列表 -->
            <div class="records-container">
                <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                    <h3>交易记录</h3>
                    <span id="recordCount">0</span>
                </div>
                
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <select id="typeFilter" style="width: 100px;">
                        <option value="all">全部</option>
                        <option value="invest">总投资</option>
                        <option value="sim">SIM卡</option>
                    </select>
                    <input type="text" id="searchInput" placeholder="搜索..." style="flex: 1;">
                </div>

                <div id="recordsList"></div>
            </div>
        </div>
    </div>

    <!-- 确认对话框 -->
    <div class="confirm-dialog" id="clearConfirm">
        <div class="confirm-box">
            <h3>确认清空</h3>
            <p>确定要清空所有记录吗？</p>
            <div class="confirm-buttons">
                <button class="confirm-btn yes" onclick="clearAllRecords()">是</button>
                <button class="confirm-btn no" onclick="hideClearConfirm()">否</button>
            </div>
        </div>
    </div>

    <script>
        // ================== Apps Script 代码 ==================
        const SCRIPT_CODE = `function doGet() {
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
  var data = sheet.getDataRange().getValues();
  var records = [];
  
  for (var i = 1; i < data.length; i++) {
    if (data[i][0]) {
      records.push({
        id: data[i][0],
        date: data[i][1],
        category: data[i][2],
        operation: data[i][3],
        type: data[i][4],
        quantity: data[i][5],
        amount: data[i][6],
        desc: data[i][7],
        creator: data[i][8],
        lastEditor: data[i][9],
        createdAt: data[i][10],
        lastEditedAt: data[i][11]
      });
    }
  }
  
  return ContentService.createTextOutput(JSON.stringify(records));
}

function doPost(e) {
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
  var records = JSON.parse(e.postData.contents);
  
  sheet.clearContents();
  
  var headers = ['ID', '日期', '类别', '操作', '类型', '数量', '金额', '描述', '记录人', '最后编辑', '创建时间', '最后编辑时间'];
  sheet.getRange(1, 1, 1, headers.length).setValues([headers]);
  
  if (records.length > 0) {
    var rows = records.map(r => [
      r.id, r.date, r.category, r.operation, r.type,
      r.quantity, r.amount, r.desc, r.creator,
      r.lastEditor, r.createdAt, r.lastEditedAt
    ]);
    sheet.getRange(2, 1, rows.length, headers.length).setValues(rows);
  }
  
  return ContentService.createTextOutput(JSON.stringify({success: true}));
}`;

        // ================== 数据 ==================
        let records = [];
        let syncTimer = null;
        let scriptUrl = localStorage.getItem('script_url') || '';

        // 初始化
        loadLocalData();
        document.getElementById('investDate').valueAsDate = new Date();
        document.getElementById('simDate').valueAsDate = new Date();
        document.getElementById('scriptUrl').value = scriptUrl;
        
        updateUI();
        startAutoSync();

        // ================== 基础功能 ==================
        
        function loadLocalData() {
            try {
                records = JSON.parse(localStorage.getItem('records')) || [];
            } catch {
                records = [];
            }
        }

        function saveLocalData() {
            localStorage.setItem('records', JSON.stringify(records));
        }

        function updateUI() {
            calculateTotals();
            displayRecords();
            updateSyncStatus();
        }

        function calculateTotals() {
            let total = 0, cards = 0, inQty = 0, outQty = 0, inAmt = 0, outAmt = 0;

            records.forEach(r => {
                const amt = parseFloat(r.amount) || 0;
                const qty = parseInt(r.quantity) || 0;
                
                if (r.category === 'invest') {
                    total += r.operation === 'add' ? amt : -amt;
                } else {
                    if (r.type === 'in') {
                        total -= amt;
                        cards += qty;
                        inQty += qty;
                        inAmt += amt;
                    } else {
                        total += amt;
                        cards -= qty;
                        outQty += qty;
                        outAmt += amt;
                    }
                }
            });

            document.getElementById('totalAmount').textContent = total.toFixed(2);
            document.getElementById('totalSimCards').textContent = cards;
            document.getElementById('totalSimIn').textContent = inQty;
            document.getElementById('totalSimOut').textContent = outQty;
            document.getElementById('totalSimInAmount').textContent = inAmt.toFixed(2);
            document.getElementById('totalSimOutAmount').textContent = outAmt.toFixed(2);
        }

        function displayRecords() {
            const filter = document.getElementById('typeFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = records.filter(r => 
                (filter === 'all' || r.category === filter) &&
                (!search || (r.desc || '').toLowerCase().includes(search))
            );

            document.getElementById('recordCount').textContent = filtered.length;
            
            if (filtered.length === 0) {
                document.getElementById('recordsList').innerHTML = '<p style="text-align:center; color:#999; padding:20px;">暂无记录</p>';
                return;
            }

            const html = filtered.sort((a,b) => new Date(b.date) - new Date(a.date)).map(r => {
                const typeClass = r.category === 'invest' ? 
                    `invest-${r.operation}` : 
                    `sim-${r.type}`;
                    
                return `
                <div class="record-item ${typeClass}">
                    <div class="record-header">
                        <span>${r.category === 'invest' ? '💰 总投资' : '📱 SIM卡'} 
                              ${r.category === 'invest' ? (r.operation === 'add' ? '放钱' : '拿钱') : (r.type === 'in' ? '进卡' : '出卡')}</span>
                        <span style="color: ${(r.category === 'invest' && r.operation === 'add') || (r.category === 'sim' && r.type === 'out') ? '#27ae60' : '#e74c3c'}">
                            ${(r.category === 'invest' && r.operation === 'add') || (r.category === 'sim' && r.type === 'out') ? '+' : '-'}RM ${parseFloat(r.amount).toFixed(2)}
                        </span>
                    </div>
                    <div>📝 ${r.desc || '-'}</div>
                    <div class="record-footer">
                        <span>👤 ${r.creator} (${r.date})</span>
                        <span class="delete-btn" onclick="deleteRecord('${r.id}')">删除</span>
                    </div>
                </div>
            `}).join('');
            
            document.getElementById('recordsList').innerHTML = html;
        }

        // ================== 同步功能 ==================
        
        function copyScript() {
            navigator.clipboard.writeText(SCRIPT_CODE);
            alert('✅ 代码已复制，去 Google Sheets 粘贴');
        }

        function toggleSetup() {
            document.getElementById('setupPanel').classList.toggle('show');
        }

        function saveUrl() {
            const url = document.getElementById('scriptUrl').value.trim();
            if (url) {
                scriptUrl = url;
                localStorage.setItem('script_url', url);
                alert('URL已保存');
                manualSync();
            }
        }

        function updateSyncStatus(connected = false) {
            const dot = document.getElementById('statusDot');
            const status = document.getElementById('syncStatus');
            
            if (connected) {
                dot.className = 'status-dot connected';
                status.textContent = '已连接';
            } else {
                dot.className = 'status-dot';
                status.textContent = '未连接';
            }
        }

        async function syncFromCloud() {
            if (!scriptUrl) return;
            
            try {
                const res = await fetch(scriptUrl);
                const cloud = await res.json();
                
                if (Array.isArray(cloud) && cloud.length > 0) {
                    const merged = [...records];
                    
                    cloud.forEach(c => {
                        if (!merged.find(r => r.id === c.id)) {
                            merged.push(c);
                        }
                    });
                    
                    if (JSON.stringify(merged) !== JSON.stringify(records)) {
                        records = merged;
                        saveLocalData();
                        updateUI();
                        document.getElementById('lastSync').textContent = '刚刚同步';
                    }
                }
                
                updateSyncStatus(true);
            } catch (error) {
                console.log('同步失败:', error);
                updateSyncStatus(false);
            }
        }

        async function syncToCloud() {
            if (!scriptUrl) return;
            
            try {
                await fetch(scriptUrl, {
                    method: 'POST',
                    body: JSON.stringify(records)
                });
                updateSyncStatus(true);
            } catch (error) {
                console.log('上传失败:', error);
                updateSyncStatus(false);
            }
        }

        async function manualSync() {
            document.getElementById('lastSync').textContent = '同步中...';
            await syncFromCloud();
            await syncToCloud();
        }

        function startAutoSync() {
            if (syncTimer) clearInterval(syncTimer);
            syncTimer = setInterval(() => {
                if (document.getElementById('autoSync').checked && scriptUrl) {
                    syncFromCloud();
                }
            }, 30000);
        }

        // ================== 操作 ==================
        
        function switchType(type) {
            document.getElementById('tab-invest').classList.toggle('active', type === 'invest');
            document.getElementById('tab-sim').classList.toggle('active', type === 'sim');
            document.getElementById('investForm').style.display = type === 'invest' ? 'block' : 'none';
            document.getElementById('simForm').style.display = type === 'sim' ? 'block' : 'none';
        }

        document.getElementById('investForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            records.push({
                id: Date.now().toString(),
                category: 'invest',
                date: document.getElementById('investDate').value,
                operation: document.getElementById('investOperation').value,
                amount: document.getElementById('investAmount').value,
                desc: document.getElementById('investDesc').value,
                creator: document.getElementById('investCreator').value,
                createdAt: new Date().toISOString(),
                lastEditor: document.getElementById('investCreator').value,
                lastEditedAt: new Date().toISOString()
            });
            
            saveLocalData();
            updateUI();
            await syncToCloud();
            
            e.target.reset();
            document.getElementById('investDate').valueAsDate = new Date();
        });

        document.getElementById('simForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            records.push({
                id: Date.now().toString(),
                category: 'sim',
                date: document.getElementById('simDate').value,
                type: document.getElementById('simType').value,
                quantity: document.getElementById('simQuantity').value,
                amount: document.getElementById('simAmount').value,
                desc: document.getElementById('simDesc').value,
                creator: document.getElementById('simCreator').value,
                createdAt: new Date().toISOString(),
                lastEditor: document.getElementById('simCreator').value,
                lastEditedAt: new Date().toISOString()
            });
            
            saveLocalData();
            updateUI();
            await syncToCloud();
            
            e.target.reset();
            document.getElementById('simDate').valueAsDate = new Date();
        });

        function deleteRecord(id) {
            records = records.filter(r => r.id !== id);
            saveLocalData();
            updateUI();
            syncToCloud();
        }

        // 清空
        function showClearConfirm() {
            document.getElementById('clearConfirm').classList.add('show');
        }

        function hideClearConfirm() {
            document.getElementById('clearConfirm').classList.remove('show');
        }

        function clearAllRecords() {
            records = [];
            saveLocalData();
            updateUI();
            syncToCloud();
            hideClearConfirm();
        }

        // 筛选
        document.getElementById('typeFilter').addEventListener('change', displayRecords);
        document.getElementById('searchInput').addEventListener('input', displayRecords);
    </script>
</body>
</html>
