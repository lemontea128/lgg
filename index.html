<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>总投资 + SIM卡进出 - 自动同步</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 总投资卡片 */
        .total-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            color: white;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
        }

        .total-card .label {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .total-card .amount {
            font-size: 60px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .total-card .currency {
            font-size: 20px;
            opacity: 0.8;
        }

        /* 同步状态 */
        .sync-status {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .sync-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #f39c12;
        }

        .sync-indicator.synced {
            background: #27ae60;
            box-shadow: 0 0 10px #27ae60;
        }

        .sync-indicator.error {
            background: #e74c3c;
        }

        .sync-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            backdrop-filter: blur(5px);
        }

        .sync-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        /* SIM卡统计卡片 */
        .sim-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .sim-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .sim-card .title {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .sim-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }

        .sim-card .sub {
            color: #999;
            font-size: 14px;
            margin-top: 5px;
        }

        /* 同步面板 */
        .sync-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: none;
        }

        .sync-panel.show {
            display: block;
        }

        .sync-panel h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .sync-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .sync-input-group input {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }

        .sync-input-group button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .sync-input-group button:hover {
            background: #5a67d8;
        }

        .sync-info {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
        }

        /* 主要内容 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
        }

        /* 表单 */
        .form-container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .form-container h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }

        .type-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .type-tab {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            text-align: center;
        }

        .type-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }

        .btn-success {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
        }

        /* 记录列表 */
        .records-container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            max-height: 700px;
            overflow-y: auto;
        }

        .records-container h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            display: flex;
            justify-content: space-between;
        }

        .record-count {
            background: #667eea;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .record-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid;
        }

        .record-item.invest-add { border-left-color: #27ae60; }
        .record-item.invest-sub { border-left-color: #e74c3c; }
        .record-item.sim-in { border-left-color: #3498db; }
        .record-item.sim-out { border-left-color: #f39c12; }

        .record-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .record-type {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 15px;
            font-weight: bold;
        }

        .type-invest-add { background: #d4efdf; color: #27ae60; }
        .type-invest-sub { background: #fadbd8; color: #e74c3c; }
        .type-sim-in { background: #d4e6f1; color: #3498db; }
        .type-sim-out { background: #fef5e7; color: #f39c12; }

        .record-amount {
            font-weight: bold;
        }

        .record-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 10px 0;
            font-size: 13px;
            color: #666;
        }

        .record-footer {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #999;
            border-top: 1px dashed #ddd;
            padding-top: 8px;
            margin-top: 8px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            margin-left: 10px;
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-bar select,
        .filter-bar input {
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }

        .filter-bar select { flex: 0 0 120px; }
        .filter-bar input { flex: 1; }

        /* 确认对话框 */
        .confirm-dialog {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .confirm-dialog.show {
            display: flex;
        }

        .confirm-box {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 400px;
            text-align: center;
        }

        .confirm-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .confirm-btn {
            padding: 10px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .confirm-btn.yes {
            background: #e74c3c;
            color: white;
        }

        .confirm-btn.no {
            background: #95a5a6;
            color: white;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            .sim-stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 总投资卡片 -->
        <div class="total-card">
            <div class="sync-status">
                <div class="sync-indicator" id="syncIndicator"></div>
                <button class="sync-btn" onclick="toggleSyncPanel()">⚙️ 同步设置</button>
                <button class="sync-btn" onclick="forceSync()">🔄 立即同步</button>
            </div>
            <div class="label">💰 当前总投资</div>
            <div class="amount" id="totalAmount">0.00</div>
            <div class="currency">马来西亚林吉特 (RM)</div>
        </div>

        <!-- SIM卡统计 -->
        <div class="sim-stats">
            <div class="sim-card">
                <div class="title">📱 SIM卡总数量</div>
                <div class="number" id="totalSimCards">0</div>
                <div class="sub">张</div>
            </div>
            <div class="sim-card">
                <div class="title">📥 SIM卡总进</div>
                <div class="number" id="totalSimIn">0</div>
                <div class="sub">张 (RM <span id="totalSimInAmount">0.00</span>)</div>
            </div>
            <div class="sim-card">
                <div class="title">📤 SIM卡总出</div>
                <div class="number" id="totalSimOut">0</div>
                <div class="sub">张 (RM <span id="totalSimOutAmount">0.00</span>)</div>
            </div>
        </div>

        <!-- 同步面板 -->
        <div class="sync-panel" id="syncPanel">
            <h3>🔗 同步设置</h3>
            <div class="sync-input-group">
                <input type="text" id="binId" placeholder="Bin ID (留空自动创建)" value="">
                <button onclick="saveBinId()">保存</button>
            </div>
            <div class="sync-input-group">
                <input type="password" id="apiKey" placeholder="API Key (必填)" value="$2a$10$z4dUKx5QKk5QKk5QKk5QKu">
                <button onclick="saveApiKey()">保存</button>
            </div>
            <div class="sync-info" id="syncInfo">
                ⚡ 打开浏览器自动同步
            </div>
        </div>

        <!-- 主要内容 -->
        <div class="main-content">
            <!-- 表单 -->
            <div class="form-container">
                <h2>
                    📝 添加记录
                    <button class="clear-btn" onclick="showClearConfirm()">🗑️ 清空所有</button>
                </h2>
                
                <div class="type-tabs">
                    <div class="type-tab active" onclick="switchType('invest')" id="tab-invest">💰 总投资</div>
                    <div class="type-tab" onclick="switchType('sim')" id="tab-sim">📱 SIM卡</div>
                </div>
                
                <form id="investForm" style="display: block;">
                    <div class="form-group">
                        <label>日期</label>
                        <input type="date" id="investDate" required>
                    </div>
                    <div class="form-group">
                        <label>操作</label>
                        <select id="investOperation" required>
                            <option value="add">➕ 放钱 (增加总投资)</option>
                            <option value="subtract">➖ 拿钱 (减少总投资)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>金额 (RM)</label>
                        <input type="number" id="investAmount" min="0" step="0.01" value="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>描述</label>
                        <input type="text" id="investDesc" required>
                    </div>
                    <div class="form-group">
                        <label>记录人</label>
                        <input type="text" id="investCreator" required>
                    </div>
                    <button type="submit" class="btn btn-success">💰 添加总投资记录</button>
                </form>

                <form id="simForm" style="display: none;">
                    <div class="form-group">
                        <label>日期</label>
                        <input type="date" id="simDate" required>
                    </div>
                    <div class="form-group">
                        <label>类型</label>
                        <select id="simType" required>
                            <option value="in">📥 SIM卡进 (买卡)</option>
                            <option value="out">📤 SIM卡出 (卖卡)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>SIM卡数量</label>
                        <input type="number" id="simQuantity" min="0" step="1" value="0" required>
                    </div>
                    <div class="form-group">
                        <label>金额 (RM)</label>
                        <input type="number" id="simAmount" min="0" step="0.01" value="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>单价</label>
                        <input type="text" id="simPrice" readonly value="0.00">
                    </div>
                    <div class="form-group">
                        <label>描述</label>
                        <textarea id="simDesc" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label>记录人</label>
                        <input type="text" id="simCreator" required>
                    </div>
                    <button type="submit" class="btn">📱 添加SIM卡记录</button>
                </form>
            </div>

            <!-- 记录列表 -->
            <div class="records-container">
                <h2>
                    交易记录
                    <span class="record-count" id="recordCount">0</span>
                </h2>
                <div class="filter-bar">
                    <select id="typeFilter">
                        <option value="all">全部</option>
                        <option value="invest">💰 总投资</option>
                        <option value="sim">📱 SIM卡</option>
                    </select>
                    <input type="text" id="searchInput" placeholder="搜索描述...">
                </div>
                <div id="recordsList"></div>
            </div>
        </div>
    </div>

    <!-- 清空确认对话框 -->
    <div class="confirm-dialog" id="clearConfirm">
        <div class="confirm-box">
            <h3>⚠️ 确认清空</h3>
            <p>确定要清空所有记录吗？</p>
            <div class="confirm-buttons">
                <button class="confirm-btn yes" onclick="clearAllRecords()">是的</button>
                <button class="confirm-btn no" onclick="hideClearConfirm()">取消</button>
            </div>
        </div>
    </div>

    <!-- 删除确认对话框 -->
    <div class="confirm-dialog" id="deleteConfirm">
        <div class="confirm-box">
            <h3>⚠️ 确认删除</h3>
            <p>确定要删除这条记录吗？</p>
            <div class="confirm-buttons">
                <button class="confirm-btn yes" onclick="confirmDelete()">是的</button>
                <button class="confirm-btn no" onclick="hideDeleteConfirm()">取消</button>
            </div>
        </div>
    </div>

    <script>
        // ================== 配置 ==================
        const JSONBIN_API_KEY = '$2a$10$z4dUKx5QKk5QKk5QKk5QKu'; // 公共测试 key
        let records = JSON.parse(localStorage.getItem('allRecords')) || [];
        let pendingDeleteId = null;
        let binId = localStorage.getItem('jsonbin_bin_id') || '';
        let lastSync = localStorage.getItem('last_sync') || '';

        // ================== 同步功能 ==================
        
        // 更新同步指示器
        function updateSyncIndicator(status) {
            const indicator = document.getElementById('syncIndicator');
            if (status === 'synced') {
                indicator.className = 'sync-indicator synced';
            } else if (status === 'error') {
                indicator.className = 'sync-indicator error';
            } else {
                indicator.className = 'sync-indicator';
            }
        }

        // 切换同步面板
        function toggleSyncPanel() {
            const panel = document.getElementById('syncPanel');
            panel.classList.toggle('show');
            if (panel.classList.contains('show')) {
                document.getElementById('binId').value = binId;
                document.getElementById('apiKey').value = JSONBIN_API_KEY;
            }
        }

        // 保存 Bin ID
        function saveBinId() {
            const newBinId = document.getElementById('binId').value.trim();
            if (newBinId) {
                binId = newBinId;
                localStorage.setItem('jsonbin_bin_id', binId);
                alert('Bin ID 已保存');
                // 立即同步一次
                syncFromCloud();
            } else {
                // 创建新的 Bin
                createNewBin();
            }
        }

        // 保存 API Key
        function saveApiKey() {
            // API Key 是固定的，不需要保存
            alert('API Key 已设置');
        }

        // 创建新的 Bin
        async function createNewBin() {
            try {
                updateSyncIndicator('syncing');
                
                const data = {
                    records: records,
                    lastUpdate: new Date().toISOString()
                };

                const response = await fetch('https://api.jsonbin.io/v3/b', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    const result = await response.json();
                    binId = result.metadata.id;
                    localStorage.setItem('jsonbin_bin_id', binId);
                    document.getElementById('binId').value = binId;
                    
                    updateSyncIndicator('synced');
                    alert(`✅ Bin 创建成功！ID: ${binId}`);
                } else {
                    updateSyncIndicator('error');
                    alert('❌ 创建失败');
                }
            } catch (error) {
                updateSyncIndicator('error');
                alert('❌ 创建失败: ' + error.message);
            }
        }

        // 保存到云端
        async function saveToCloud() {
            if (!binId) return;

            try {
                const data = {
                    records: records,
                    lastUpdate: new Date().toISOString()
                };

                const response = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    localStorage.setItem('last_sync', new Date().toISOString());
                    updateSyncIndicator('synced');
                    console.log('✅ 已同步到云端');
                } else {
                    updateSyncIndicator('error');
                    console.error('❌ 同步失败');
                }
            } catch (error) {
                updateSyncIndicator('error');
                console.error('❌ 同步失败:', error);
            }
        }

        // 从云端加载
        async function loadFromCloud() {
            if (!binId) return;

            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
                    headers: {
                        'X-Master-Key': JSONBIN_API_KEY
                    }
                });

                if (response.ok) {
                    const result = await response.json();
                    const cloudData = result.record;
                    
                    if (cloudData.records && cloudData.records.length > 0) {
                        // 合并数据
                        const merged = mergeData(records, cloudData.records);
                        
                        if (JSON.stringify(merged) !== JSON.stringify(records)) {
                            records = merged;
                            localStorage.setItem('allRecords', JSON.stringify(records));
                            
                            // 刷新显示
                            calculateTotals();
                            displayRecords();
                            
                            console.log('✅ 从云端加载了新数据');
                        }
                    }
                    
                    updateSyncIndicator('synced');
                }
            } catch (error) {
                console.error('❌ 加载失败:', error);
                updateSyncIndicator('error');
            }
        }

        // 强制同步
        function forceSync() {
            if (binId) {
                saveToCloud();
                setTimeout(() => loadFromCloud(), 1000);
                alert('同步中...');
            } else {
                alert('请先设置 Bin ID');
            }
        }

        // 合并数据
        function mergeData(local, cloud) {
            const allRecords = [...local];
            
            cloud.forEach(cloudRecord => {
                const existing = allRecords.find(r => r.id === cloudRecord.id);
                if (!existing) {
                    allRecords.push(cloudRecord);
                } else {
                    if (new Date(cloudRecord.lastEditedAt) > new Date(existing.lastEditedAt)) {
                        Object.assign(existing, cloudRecord);
                    }
                }
            });
            
            return allRecords;
        }

        // ================== 原有功能 ==================

        function switchType(type) {
            if (type === 'invest') {
                document.getElementById('tab-invest').classList.add('active');
                document.getElementById('tab-sim').classList.remove('active');
                document.getElementById('investForm').style.display = 'block';
                document.getElementById('simForm').style.display = 'none';
            } else {
                document.getElementById('tab-sim').classList.add('active');
                document.getElementById('tab-invest').classList.remove('active');
                document.getElementById('simForm').style.display = 'block';
                document.getElementById('investForm').style.display = 'none';
            }
        }

        document.getElementById('simQuantity').addEventListener('input', calculatePrice);
        document.getElementById('simAmount').addEventListener('input', calculatePrice);

        function calculatePrice() {
            const q = parseFloat(document.getElementById('simQuantity').value) || 0;
            const a = parseFloat(document.getElementById('simAmount').value) || 0;
            document.getElementById('simPrice').value = q > 0 ? (a / q).toFixed(2) : '0.00';
        }

        function calculateTotals() {
            let totalInvestment = 0;
            let totalSimCards = 0;
            let totalSimIn = 0, totalSimOut = 0;
            let totalSimInAmount = 0, totalSimOutAmount = 0;

            records.forEach(r => {
                const amount = parseFloat(r.amount) || 0;
                
                if (r.category === 'invest') {
                    if (r.operation === 'add') totalInvestment += amount;
                    else totalInvestment -= amount;
                } else {
                    const q = parseInt(r.quantity) || 0;
                    if (r.type === 'in') {
                        totalInvestment -= amount;
                        totalSimCards += q;
                        totalSimIn += q;
                        totalSimInAmount += amount;
                    } else {
                        totalInvestment += amount;
                        totalSimCards -= q;
                        totalSimOut += q;
                        totalSimOutAmount += amount;
                    }
                }
            });

            document.getElementById('totalAmount').textContent = totalInvestment.toFixed(2);
            document.getElementById('totalSimCards').textContent = totalSimCards;
            document.getElementById('totalSimIn').textContent = totalSimIn;
            document.getElementById('totalSimOut').textContent = totalSimOut;
            document.getElementById('totalSimInAmount').textContent = totalSimInAmount.toFixed(2);
            document.getElementById('totalSimOutAmount').textContent = totalSimOutAmount.toFixed(2);
        }

        function displayRecords(categoryFilter = 'all', searchTerm = '') {
            const list = document.getElementById('recordsList');
            
            let filtered = records.filter(r => {
                if (categoryFilter !== 'all' && r.category !== categoryFilter) return false;
                if (searchTerm && !(r.desc || '').toLowerCase().includes(searchTerm.toLowerCase())) return false;
                return true;
            });

            document.getElementById('recordCount').textContent = filtered.length;

            if (filtered.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#999; padding:20px;">暂无记录</p>';
                return;
            }

            list.innerHTML = filtered.sort((a, b) => new Date(b.date) - new Date(a.date)).map(r => {
                if (r.category === 'invest') {
                    return `
                    <div class="record-item invest-${r.operation}">
                        <div class="record-header">
                            <span class="record-type type-invest-${r.operation}">
                                💰 总投资 ${r.operation === 'add' ? '放钱' : '拿钱'}
                            </span>
                            <span class="record-amount" style="color: ${r.operation === 'add' ? '#27ae60' : '#e74c3c'}">
                                ${r.operation === 'add' ? '+' : '-'}RM ${parseFloat(r.amount).toFixed(2)}
                            </span>
                        </div>
                        <div style="background:#fff; padding:8px; border-radius:5px; margin:5px 0;">
                            📝 ${r.desc || '-'}
                        </div>
                        <div class="record-footer">
                            <span>👤 ${r.creator} (${r.date})</span>
                            <span>✏️ ${r.lastEditor || r.creator} <button class="delete-btn" onclick="showDeleteConfirm('${r.id}')">删除</button></span>
                        </div>
                    </div>
                `;
                } else {
                    const price = (parseFloat(r.amount) / parseInt(r.quantity)).toFixed(2);
                    return `
                    <div class="record-item sim-${r.type}">
                        <div class="record-header">
                            <span class="record-type type-sim-${r.type}">
                                📱 SIM卡 ${r.type === 'in' ? '进' : '出'}
                            </span>
                            <span class="record-amount" style="color: ${r.type === 'in' ? '#e74c3c' : '#27ae60'}">
                                ${r.type === 'in' ? '-' : '+'}RM ${parseFloat(r.amount).toFixed(2)}
                            </span>
                        </div>
                        <div class="record-details">
                            <span>📅 ${r.date}</span>
                            <span>📱 ${r.quantity}张</span>
                            <span>💰 RM ${price}/张</span>
                        </div>
                        <div style="background:#fff; padding:8px; border-radius:5px; margin:5px 0;">
                            📝 ${r.desc || '-'}
                        </div>
                        <div class="record-footer">
                            <span>👤 ${r.creator}</span>
                            <span>✏️ ${r.lastEditor || r.creator} <button class="delete-btn" onclick="showDeleteConfirm('${r.id}')">删除</button></span>
                        </div>
                    </div>
                `;
                }
            }).join('');
        }

        // 提交表单
        document.getElementById('investForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const newRecord = {
                id: Date.now().toString(),
                category: 'invest',
                date: document.getElementById('investDate').value,
                operation: document.getElementById('investOperation').value,
                amount: document.getElementById('investAmount').value,
                desc: document.getElementById('investDesc').value,
                creator: document.getElementById('investCreator').value,
                createdAt: new Date().toISOString(),
                lastEditor: document.getElementById('investCreator').value,
                lastEditedAt: new Date().toISOString()
            };
            records.push(newRecord);
            localStorage.setItem('allRecords', JSON.stringify(records));
            calculateTotals();
            displayRecords();
            saveToCloud(); // 同步到云端
            this.reset();
            document.getElementById('investDate').valueAsDate = new Date();
            document.getElementById('investAmount').value = '0.00';
            alert('添加成功！');
        });

        document.getElementById('simForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const newRecord = {
                id: Date.now().toString(),
                category: 'sim',
                date: document.getElementById('simDate').value,
                type: document.getElementById('simType').value,
                quantity: document.getElementById('simQuantity').value,
                amount: document.getElementById('simAmount').value,
                desc: document.getElementById('simDesc').value,
                creator: document.getElementById('simCreator').value,
                createdAt: new Date().toISOString(),
                lastEditor: document.getElementById('simCreator').value,
                lastEditedAt: new Date().toISOString()
            };
            records.push(newRecord);
            localStorage.setItem('allRecords', JSON.stringify(records));
            calculateTotals();
            displayRecords();
            saveToCloud(); // 同步到云端
            this.reset();
            document.getElementById('simDate').valueAsDate = new Date();
            document.getElementById('simQuantity').value = '0';
            document.getElementById('simAmount').value = '0.00';
            document.getElementById('simPrice').value = '0.00';
            alert('添加成功！');
        });

        // 筛选
        document.getElementById('typeFilter').addEventListener('change', function() {
            displayRecords(this.value, document.getElementById('searchInput').value);
        });
        document.getElementById('searchInput').addEventListener('input', function() {
            displayRecords(document.getElementById('typeFilter').value, this.value);
        });

        // 清空
        function showClearConfirm() {
            document.getElementById('clearConfirm').classList.add('show');
        }
        function hideClearConfirm() {
            document.getElementById('clearConfirm').classList.remove('show');
        }
        function clearAllRecords() {
            records = [];
            localStorage.setItem('allRecords', JSON.stringify(records));
            calculateTotals();
            displayRecords();
            saveToCloud(); // 同步到云端
            hideClearConfirm();
            alert('已清空');
        }

        // 删除
        function showDeleteConfirm(id) {
            pendingDeleteId = id;
            document.getElementById('deleteConfirm').classList.add('show');
        }
        function hideDeleteConfirm() {
            pendingDeleteId = null;
            document.getElementById('deleteConfirm').classList.remove('show');
        }
        function confirmDelete() {
            if (pendingDeleteId) {
                records = records.filter(r => r.id !== pendingDeleteId);
                localStorage.setItem('allRecords', JSON.stringify(records));
                calculateTotals();
                displayRecords();
                saveToCloud(); // 同步到云端
                hideDeleteConfirm();
                alert('已删除');
            }
        }

        // 初始化
        document.getElementById('investDate').valueAsDate = new Date();
        document.getElementById('simDate').valueAsDate = new Date();
        
        // 如果有 Bin ID，自动从云端加载
        if (binId) {
            loadFromCloud();
        }
        
        calculateTotals();
        displayRecords();

        // 点击外部关闭面板
        window.onclick = function(e) {
            if (e.target === document.getElementById('clearConfirm')) hideClearConfirm();
            if (e.target === document.getElementById('deleteConfirm')) hideDeleteConfirm();
        };
    </script>
</body>
</html>
